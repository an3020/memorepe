<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="340" fill="white"/>
  <text font-family="Arial" font-size="16" font-weight="500" fill="#111" x="340" y="30" text-anchor="middle">Cómo el sueño consolida la memoria</text>

  <!-- Hipocampo -->
  <rect x="60" y="80" width="180" height="80" rx="12" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text font-family="Arial" font-size="13" font-weight="500" fill="#5b21b6" x="150" y="115" text-anchor="middle">Hipocampo</text>
  <text font-family="Arial" font-size="11" fill="#7c3aed" x="150" y="138" text-anchor="middle">Memoria a corto plazo</text>

  <!-- Flecha durante el sueño -->
  <rect x="280" y="100" width="120" height="40" rx="8" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text font-family="Arial" font-size="11" font-weight="500" fill="#059669" x="340" y="118" text-anchor="middle">Durante</text>
  <text font-family="Arial" font-size="11" font-weight="500" fill="#059669" x="340" y="133" text-anchor="middle">el sueño</text>
  <line x1="240" y1="120" x2="280" y2="120" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="120" x2="440" y2="120" stroke="#059669" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Corteza cerebral -->
  <rect x="440" y="80" width="180" height="80" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text font-family="Arial" font-size="13" font-weight="500" fill="#065f46" x="530" y="115" text-anchor="middle">Corteza cerebral</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="530" y="138" text-anchor="middle">Memoria a largo plazo</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Comparación con/sin sueño -->
  <rect x="60" y="210" width="260" height="90" rx="10" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#065f46" x="190" y="235" text-anchor="middle">✓ Con sueño suficiente</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="190" y="258" text-anchor="middle">Recuerda hasta 40% más</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="190" y="278" text-anchor="middle">Información consolidada</text>

  <rect x="360" y="210" width="260" height="90" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#b91c1c" x="490" y="235" text-anchor="middle">✗ Sin dormir bien</text>
  <text font-family="Arial" font-size="11" fill="#ef4444" x="490" y="258" text-anchor="middle">Información en memoria corta</text>
  <text font-family="Arial" font-size="11" fill="#ef4444" x="490" y="278" text-anchor="middle">Se pierde en horas</text>

  <text font-family="Arial" font-size="12" fill="#9ca3af" x="340" y="325" text-anchor="middle">El sueño no es tiempo perdido — es cuando aprendés de verdad</text>
</svg>
