<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="320" fill="white"/>
  <text font-family="Arial" font-size="16" font-weight="500" fill="#111" x="340" y="30" text-anchor="middle">Recuperación activa vs. lectura pasiva</text>

  <!-- Pasiva -->
  <rect x="40" y="60" width="270" height="200" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text font-family="Arial" font-size="13" font-weight="500" fill="#6b7280" x="175" y="90" text-anchor="middle">Leer el apunte</text>
  <text font-family="Arial" font-size="11" fill="#9ca3af" x="175" y="110" text-anchor="middle">(recuperación pasiva)</text>

  <rect x="60" y="125" width="230" height="30" rx="6" fill="#e5e7eb"/>
  <rect x="60" y="125" width="46" height="30" rx="6" fill="#9ca3af"/>
  <text font-family="Arial" font-size="11" fill="white" x="83" y="145" text-anchor="middle">20%</text>
  <text font-family="Arial" font-size="11" fill="#6b7280" x="200" y="145" text-anchor="middle">retención</text>

  <text font-family="Arial" font-size="11" fill="#9ca3af" x="175" y="185" text-anchor="middle">El cerebro procesa</text>
  <text font-family="Arial" font-size="11" fill="#9ca3af" x="175" y="202" text-anchor="middle">de forma superficial</text>
  <text font-family="Arial" font-size="11" fill="#9ca3af" x="175" y="219" text-anchor="middle">Sensación de aprendizaje</text>
  <text font-family="Arial" font-size="11" fill="#9ca3af" x="175" y="236" text-anchor="middle">pero poca consolidación</text>

  <!-- Activa -->
  <rect x="370" y="60" width="270" height="200" rx="12" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text font-family="Arial" font-size="13" font-weight="500" fill="#065f46" x="505" y="90" text-anchor="middle">Responder preguntas</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="505" y="110" text-anchor="middle">(recuperación activa)</text>

  <rect x="390" y="125" width="230" height="30" rx="6" fill="#e5e7eb"/>
  <rect x="390" y="125" width="184" height="30" rx="6" fill="#059669"/>
  <text font-family="Arial" font-size="11" fill="white" x="483" y="145" text-anchor="middle">80%</text>
  <text font-family="Arial" font-size="11" fill="#6b7280" x="590" y="145" text-anchor="middle">retención</text>

  <text font-family="Arial" font-size="11" fill="#059669" x="505" y="185" text-anchor="middle">El cerebro trabaja</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="505" y="202" text-anchor="middle">para recuperar info</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="505" y="219" text-anchor="middle">Cada intento fortalece</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="505" y="236" text-anchor="middle">el recuerdo</text>

  <text font-family="Arial" font-size="12" fill="#9ca3af" x="340" y="300" text-anchor="middle">El esfuerzo de recordar es lo que consolida el aprendizaje</text>
</svg>
