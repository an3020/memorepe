<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="320" fill="white"/>
  <text font-family="Arial" font-size="16" font-weight="500" fill="#111" x="340" y="30" text-anchor="middle">Interferencia retroactiva: demasiado en poco tiempo</text>

  <!-- Tema 1 -->
  <rect x="40" y="70" width="110" height="50" rx="8" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#065f46" x="95" y="92" text-anchor="middle">Tema A</text>
  <text font-family="Arial" font-size="10" fill="#059669" x="95" y="110" text-anchor="middle">aprendido</text>

  <!-- Tema 2 empuja a Tema 1 -->
  <rect x="170" y="70" width="110" height="50" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#92400e" x="225" y="92" text-anchor="middle">Tema B</text>
  <text font-family="Arial" font-size="10" fill="#d97706" x="225" y="110" text-anchor="middle">interfiere</text>
  <line x1="160" y1="95" x2="152" y2="95" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tema 3 -->
  <rect x="300" y="70" width="110" height="50" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#92400e" x="355" y="92" text-anchor="middle">Tema C</text>
  <text font-family="Arial" font-size="10" fill="#d97706" x="355" y="110" text-anchor="middle">interfiere</text>
  <line x1="290" y1="95" x2="282" y2="95" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tema 4 -->
  <rect x="430" y="70" width="110" height="50" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#b91c1c" x="485" y="92" text-anchor="middle">Tema D</text>
  <text font-family="Arial" font-size="10" fill="#ef4444" x="485" y="110" text-anchor="middle">interfiere</text>
  <line x1="420" y1="95" x2="412" y2="95" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tema 5 -->
  <rect x="560" y="70" width="80" height="50" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#b91c1c" x="600" y="92" text-anchor="middle">Tema E</text>
  <text font-family="Arial" font-size="10" fill="#ef4444" x="600" y="110" text-anchor="middle">nuevo</text>

  <!-- Resultado -->
  <rect x="40" y="170" width="260" height="80" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#b91c1c" x="170" y="198" text-anchor="middle">✗ Estudiar 5 temas en una noche</text>
  <text font-family="Arial" font-size="11" fill="#ef4444" x="170" y="220" text-anchor="middle">Ninguno queda bien consolidado</text>
  <text font-family="Arial" font-size="11" fill="#ef4444" x="170" y="238" text-anchor="middle">La memoria a corto plazo se satura</text>

  <rect x="380" y="170" width="260" height="80" rx="10" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text font-family="Arial" font-size="12" font-weight="500" fill="#065f46" x="510" y="198" text-anchor="middle">✓ Estudiar 2 temas bien</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="510" y="220" text-anchor="middle">Consolidación profunda</text>
  <text font-family="Arial" font-size="11" fill="#059669" x="510" y="238" text-anchor="middle">Retención a largo plazo</text>

  <text font-family="Arial" font-size="12" fill="#9ca3af" x="340" y="305" text-anchor="middle">Menos es más cuando el tiempo es limitado</text>
</svg>
